# Linky User Profile — 注册偏好
# 当需要注册新平台时，skill 会读取这里的信息预填表单

[identity]
# 偏好的用户名（按优先级排列，第一个被占用时尝试下一个）
usernames = [""]
# 显示名称
display_name = ""
# 邮箱
email = ""
# 头像文件路径（本地路径，注册时上传）
avatar = ""

[preferences]
# 偏好的注册方式: "email" | "phone" | "wechat" | "github" | "google"
preferred_signup = "email"
# 语言偏好
language = "zh-CN"
# 个人简介（部分平台注册时需要）
bio = ""
